name: CI

on:
  push:
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    steps:
      - uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Install Playwright Chromium (with system deps)
        run: bunx playwright install --with-deps chromium

      - name: Typecheck
        run: bun run typecheck

      - name: Run freeze-visibility test
        run: bunx vitest run src/lib/tests/snapshot/__tests__/freeze-visibility.test.ts

      - name: Run render-canary test
        run: bunx vitest run src/lib/tests/snapshot/__tests__/render-canary.test.ts

      - name: Run snapshot diff tests
        run: bunx vitest run src/lib/tests/snapshot/__tests__/snapshot.test.ts

      - name: Upload canary artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: render-canary-artifacts
          path: |
            corpus/**/render-canary.families.json
            corpus/**/render-canary.json
          if-no-files-found: ignore
          retention-days: 14
