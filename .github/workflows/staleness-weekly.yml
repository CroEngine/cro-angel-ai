name: corpus staleness check (weekly)

# Grind 3 — auktoritativt TTL-baserat staleness-scan. Människa triggar
# re-freeze; detta jobb öppnar bara en issue med listan så den blir synlig.
on:
  schedule:
    - cron: "0 6 * * 1" # mån kl 06:00 UTC
  workflow_dispatch:

jobs:
  staleness:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      issues: write
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest
      - run: bun install --frozen-lockfile
      - name: Run staleness check
        run: bun run scripts/freeze-staleness-check.ts
      - name: Open issue if stale snapshots exist
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const path = require('path');
            const report = JSON.parse(fs.readFileSync('corpus/STALENESS.json', 'utf8'));
            if (report.staleCount === 0) {
              core.info(`No stale snapshots (${report.total} checked).`);
              return;
            }
            const lines = report.snapshots
              .filter(s => s.stale)
              .map(s => `- **${s.name}** — ${s.staleReason}\n  url: ${s.url}\n  frozenAt: ${s.frozenAt}`)
              .join('\n');
            const body = [
              `## ${report.staleCount} stale corpus snapshot(s) — re-freeze decision required`,
              ``,
              `Generated by \`scripts/freeze-staleness-check.ts\` on ${report.ranAt}.`,
              ``,
              `TTL är auktoritativt. HEAD-diff är rådgivande (se hints i STALENESS.json).`,
              `Människa-i-loopen: granska, re-freeze sajt-för-sajt med`,
              `\`bun run scripts/freeze-site.ts --name=<name>\` när rätt.`,
              ``,
              lines,
            ].join('\n');
            await github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title: `corpus staleness: ${report.staleCount} snapshot(s) past TTL`,
              body,
              labels: ['corpus', 'staleness'],
            });
