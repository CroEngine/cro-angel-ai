name: DB migrate

# Applies Supabase migrations and regenerates types.ts when a migration lands on
# main, then commits the refreshed types back — so the schema applies itself
# without anyone running the CLI by hand. Owned-flow automation; see
# docs/DATABASE.md.
#
# Requires repo Actions secrets SUPABASE_ACCESS_TOKEN and SUPABASE_DB_PASSWORD
# (Settings -> Secrets and variables -> Actions). Until those are set the job
# no-ops and stays green.

on:
  push:
    branches: [main]
    paths:
      - "supabase/migrations/**"
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: db-migrate
  cancel-in-progress: false

jobs:
  migrate:
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
      SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
      SUPABASE_DB_PASSWORD: ${{ secrets.SUPABASE_DB_PASSWORD }}
    steps:
      - name: Check Supabase secrets
        id: guard
        run: |
          if [[ -z "$SUPABASE_ACCESS_TOKEN" || -z "$SUPABASE_DB_PASSWORD" ]]; then
            echo "::notice::Supabase secrets not set — skipping. Add SUPABASE_ACCESS_TOKEN + SUPABASE_DB_PASSWORD in Settings -> Secrets and variables -> Actions."
            echo "skip=true" >> "$GITHUB_OUTPUT"
          fi

      - uses: actions/checkout@v4
        if: steps.guard.outputs.skip != 'true'

      - uses: oven-sh/setup-bun@v2
        if: steps.guard.outputs.skip != 'true'
        with:
          bun-version: latest

      - name: Install dependencies
        if: steps.guard.outputs.skip != 'true'
        run: bun install --frozen-lockfile

      - name: Link Supabase project
        if: steps.guard.outputs.skip != 'true'
        run: bun run db:link

      - name: Apply migrations
        if: steps.guard.outputs.skip != 'true'
        run: bun run db:push

      - name: Regenerate types
        if: steps.guard.outputs.skip != 'true'
        run: bun run db:types

      - name: Commit & push regenerated types if changed
        if: steps.guard.outputs.skip != 'true'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          if [[ -n "$(git status --porcelain src/integrations/supabase/types.ts)" ]]; then
            git add src/integrations/supabase/types.ts
            git commit -m "chore(db): regenerate Supabase types [skip ci]"
            git push
          else
            echo "types.ts unchanged."
          fi
